name: Product Parser

on:
  push:
    branches:
        - "**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
    
      - name: Setup Python
        uses: actions/setup_python@v4
        with:
          python-version: "3.11"
    
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Istall Dependencies
        run: pip install -r requiirements.txt

      - name: Isort Check
        run: isort --check .

      - name: Black Check
        run: black --check .

      - name: Flake8 Check
        run: flake8 .


